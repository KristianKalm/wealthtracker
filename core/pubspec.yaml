name: kryptic_core
description: "Reusable core infrastructure for Kryptic apps."
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.8.1

flutter:
  generate: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.4.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4

  # DB
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.6.5
  sqlite3: ^2.9.4
  path: ^1.9.0

  # Crypto
  crypto: ^3.0.6
  encrypt: ^5.0.3
  openpgp: 3.10.6
  pointycastle: ^3.9.1
  bip39: ^1.0.6

  # Auth
  local_auth: ^2.3.0

  # Utils
  device_info_plus: ^11.1.1
  path_provider: ^2.1.5

  # UI
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  image_picker: ^1.2.0
  image_cropper: ^11.0.0
  image: 4.5.4
  browser_image_compression: ^1.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.8.0
