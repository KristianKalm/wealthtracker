name: Build Release

on:
  workflow_dispatch:
    inputs:
      only_ios:
        description: 'Only iOS (skip Android APK and AAB)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android signing secrets
        if: ${{ !inputs.only_ios }}
        run: |
          mkdir -p secrets
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > secrets/wealthtracker.jks
          echo "${{ secrets.KEYSTORE_PASSWORD }}" > secrets/keystore_password

      - name: Increment patch version
        run: |
          cd app
          # Extract current version (e.g., 0.0.1)
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          # Split into major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          # Update pubspec.yaml
          sed -i "s/version: $VERSION/version: $NEW_VERSION/" pubspec.yaml

      - name: Build web
        run: |
          cd app
          flutter pub get
          flutter build web --release

      - name: Build Android APK
        if: ${{ !inputs.only_ios }}
        run: |
          cd app
          flutter build apk --release

      - name: Build Android AAB
        if: ${{ !inputs.only_ios }}
        run: |
          cd app
          flutter build appbundle --release

      - name: Commit and push version bump
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          cd app
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          git add pubspec.yaml
          git commit -m "Bump version to $VERSION"
          git push

      - name: Extract app version
        id: version
        run: |
          cd app
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          cd app/build/web
          zip -r ../../../web-${{ steps.version.outputs.version }}.zip .

      - name: Rename APK
        if: ${{ !inputs.only_ios }}
        run: mv app/build/app/outputs/flutter-apk/app-release.apk app/build/app/outputs/flutter-apk/android-${{ steps.version.outputs.version }}.apk

      - name: Rename AAB
        if: ${{ !inputs.only_ios }}
        run: mv app/build/app/outputs/bundle/release/app-release.aab app/build/app/outputs/bundle/release/android-${{ steps.version.outputs.version }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            web-${{ steps.version.outputs.version }}.zip
            app/build/app/outputs/flutter-apk/android-${{ steps.version.outputs.version }}.apk
            app/build/app/outputs/bundle/release/android-${{ steps.version.outputs.version }}.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/build/web --project-name=wealthtracker

  build-ios:
    runs-on: macos-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID xml1 -o - - | grep -oE '[A-Fa-f0-9-]{36}')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Configure manual code signing
        run: |
          PBXPROJ=app/ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' $PBXPROJ
          sed -i '' 's/"iPhone Developer"/"Apple Distribution"/g' $PBXPROJ
          sed -i '' "s/DEVELOPMENT_TEAM = DGQCZ44ZU7;/DEVELOPMENT_TEAM = DGQCZ44ZU7;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" $PBXPROJ

      - name: Build IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>DGQCZ44ZU7</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.wealthtracker</key>
              <string>${{ env.PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          EOF
          cd app
          flutter pub get
          flutter build ipa --release --export-options-plist=$RUNNER_TEMP/ExportOptions.plist

      - name: Rename IPA
        run: |
          VERSION=${{ needs.deploy.outputs.version }}
          mv app/build/ios/ipa/*.ipa app/build/ios/ipa/ios-$VERSION.ipa

      - name: Upload IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.deploy.outputs.version }}
          files: app/build/ios/ipa/ios-${{ needs.deploy.outputs.version }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}